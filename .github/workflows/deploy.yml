name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker Login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push Backend
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      # 4️⃣ Build & Push Frontend
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # 5️⃣ Create SSH Key from base64
      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem

      # 6️⃣ Verify Key (DEBUG STEP)
      - name: Verify Key
        run: |
          echo "Size:"
          ls -l ec2_key.pem

          echo "Start:"
          head -1 ec2_key.pem

          echo "End:"
          tail -1 ec2_key.pem

      # 7️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key_path: ec2_key.pem
          port: 22
          debug: true
          script: |
            echo "✅ Connected"
            whoami

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            docker pull ${DOCKER_USERNAME}/url-shortener-frontend:latest

            docker-compose down || true
            docker-compose up -d

            docker ps
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}