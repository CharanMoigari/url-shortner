name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker Login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push Backend
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      # 4️⃣ Build & Push Frontend
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}   # ✅ RAW PEM KEY (NOT BASE64)
          port: 22
          debug: true
          script: |
            set -e

            echo "✅ Connected to EC2"
            whoami

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            # Create docker-compose file
            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                container_name: url-shortener-backend
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  NODE_ENV: production
                restart: always

              frontend:
                image: ${DOCKER_USERNAME}/url-shortener-frontend:latest
                container_name: url-shortener-frontend
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: always

            networks:
              default:
                driver: bridge
            EOF

            # Pull latest images
            docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            docker pull ${DOCKER_USERNAME}/url-shortener-frontend:latest

            # Restart containers
            docker-compose down || true
            docker-compose up -d

            sleep 5
            docker ps
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}