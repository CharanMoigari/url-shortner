name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Debug SSH Key
        run: |
          echo "===== START KEY ====="
          echo "${{ secrets.EC2_SSH_KEY }}"
          echo "===== END KEY ====="

          echo "Line count:"
          echo "${{ secrets.EC2_SSH_KEY }}" | wc -l
            # 2️⃣ Docker Login
            - name: Docker Login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      # 4️⃣ Build & Push Frontend
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # 5️⃣ Create SSH key in workspace (IMPORTANT)
      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key_path: ec2_key.pem
          port: 22
          script_stop: true
          script: |
            set -e

            echo "✅ Connected to EC2"
            whoami

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                container_name: url-shortener-backend
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  NODE_ENV: production
                restart: always

              frontend:
                image: ${DOCKER_USERNAME}/url-shortener-frontend:latest
                container_name: url-shortener-frontend
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: always

            networks:
              default:
                driver: bridge
            EOF

            docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            docker pull ${DOCKER_USERNAME}/url-shortener-frontend:latest

            docker-compose down || true
            docker-compose up -d

            sleep 5
            docker-compose ps
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}