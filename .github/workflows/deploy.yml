            # Create docker-compose file
            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                container_name: url-shortener-backend
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  NODE_ENV: production
                restart: always

              frontend:
                image: ${DOCKER_USERNAME}/url-shortener-frontend:latest
                container_name: url-shortener-frontend
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: always

            networks:
              default:
                driver: bridge
            EOF

            # Pull latest images
            docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            docker pull ${DOCKER_USERNAME}/url-shortener-frontend:latest

            # Restart containers
            docker-compose down || true
            docker-compose up -d

            sleep 5
            docker ps
