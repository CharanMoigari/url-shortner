name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker Login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Backend
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      # 4️⃣ Build Frontend
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # ===============================
      # 🚀 DEPLOY TO EC2-1
      # ===============================
      - name: Deploy to EC2-1
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            MONGO_URI="${{ secrets.MONGO_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"

            echo "Deploying to EC2-1"
            echo "DOCKER_USERNAME=$DOCKER_USERNAME"

            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io docker-compose
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  SHORT_URL_BASE: http://url-shortener-alb-1413916545.eu-north-1.elb.amazonaws.com
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d

      # ===============================
      # 🚀 DEPLOY TO EC2-2
      # ===============================
      - name: Deploy to EC2-2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            MONGO_URI="${{ secrets.MONGO_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"

            echo "Deploying to EC2-2"

            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io docker-compose
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  SHORT_URL_BASE: http://url-shortener-alb-1413916545.eu-north-1.elb.amazonaws.com
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d

      # ===============================
      # 🚀 DEPLOY TO EC2-3
      # ===============================
      - name: Deploy to EC2-3
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_3 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            MONGO_URI="${{ secrets.MONGO_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"

            echo "Deploying to EC2-3"

            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io docker-compose
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  SHORT_URL_BASE: http://url-shortener-alb-1413916545.eu-north-1.elb.amazonaws.com
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d