name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # Docker login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend:latest ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend:latest

      # Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend:latest ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend:latest

      # Deploy to EC2
      - name: Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/url-shortener

            echo "Pulling latest images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend:latest

            echo "Creating env file..."
            cat > .env <<EOF
            BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/url-shortener-backend:latest
            FRONTEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend:latest
            EOF

            echo "Restarting containers..."
            docker-compose --env-file .env down || true
            docker-compose --env-file .env up -d

            docker ps