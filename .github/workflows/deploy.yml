name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build backend
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      # 4️⃣ Build frontend
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # 5️⃣ Decode SSH key (IMPORTANT)
      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_BASE64 }}" | base64 -d > ec2_key.pem
          chmod 600 ec2_key.pem

      # 6️⃣ Deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key_path: ec2_key.pem
          port: 22
          debug: true
          script: |
            echo "✅ Connected"
            whoami

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            docker pull ${DOCKER_USERNAME}/url-shortener-frontend:latest

            docker-compose down || true
            docker-compose up -d

            docker ps
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}