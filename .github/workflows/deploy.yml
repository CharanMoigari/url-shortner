name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # ===============================
      # 🚀 EC2 DEPLOY FUNCTION
      # ===============================

      - name: Deploy to EC2-1
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            MONGO_URI="${{ secrets.MONGO_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PORT="${{ secrets.REDIS_PORT }}"
            SHORTURL="http://url-lb-1871988258.eu-north-1.elb.amazonaws.com"

            sudo apt update
            sudo apt install -y docker.io docker-compose || true
            sudo systemctl start docker
            sudo systemctl enable docker

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  REDIS_HOST: ${REDIS_HOST}
                  REDIS_PORT: ${REDIS_PORT}
                  SHORTURL: ${SHORTURL}
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d

      # ===============================
      # 🚀 EC2-2
      # ===============================

      - name: Deploy to EC2-2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            MONGO_URI="${{ secrets.MONGO_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PORT="${{ secrets.REDIS_PORT }}"
            SHORTURL="http://url-lb-1871988258.eu-north-1.elb.amazonaws.com"

            sudo apt update
            sudo apt install -y docker.io docker-compose || true
            sudo systemctl start docker
            sudo systemctl enable docker

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  REDIS_HOST: ${REDIS_HOST}
                  REDIS_PORT: ${REDIS_PORT}
                  SHORTURL: ${SHORTURL}
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d

      # ===============================
      # 🚀 EC2-3
      # ===============================

      - name: Deploy to EC2-3
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_3 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            MONGO_URI="${{ secrets.MONGO_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PORT="${{ secrets.REDIS_PORT }}"
            SHORTURL="http://url-lb-1871988258.eu-north-1.elb.amazonaws.com"

            sudo apt update
            sudo apt install -y docker.io docker-compose || true
            sudo systemctl start docker
            sudo systemctl enable docker

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                  REDIS_HOST: ${REDIS_HOST}
                  REDIS_PORT: ${REDIS_PORT}
                  SHORTURL: ${SHORTURL}
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d