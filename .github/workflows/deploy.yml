name: Fullstack CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        host:
          - ${{ secrets.EC2_HOST }}
          - ${{ secrets.EC2_HOST_2 }}
          - ${{ secrets.EC2_HOST_3 }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker Login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push Backend
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-backend

      # 4️⃣ Build & Push Frontend
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener-frontend

      # 🚀 Deploy to all EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ matrix.host }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22

          # ✅ MUST BE INSIDE "with"
          envs: DOCKER_USERNAME,MONGO_URI,JWT_SECRET

          script: |
            set -e

            echo "Deploying to $(hostname)"
            echo "DOCKER_USERNAME=$DOCKER_USERNAME"

            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io docker-compose
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            mkdir -p ~/url-shortener
            cd ~/url-shortener

            cat > docker-compose.yml <<EOF
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/url-shortener-backend:latest
                container_name: backend
                ports:
                  - "5000:5000"
                environment:
                  MONGO_URI: ${MONGO_URI}
                  JWT_SECRET: ${JWT_SECRET}
                restart: always
            EOF

            sudo docker pull ${DOCKER_USERNAME}/url-shortener-backend:latest
            sudo docker-compose down || true
            sudo docker-compose up -d

            sleep 5
            sudo docker ps