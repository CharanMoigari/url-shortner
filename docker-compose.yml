version: "3.8"

services:
  backend:
    image: YOUR_DOCKER_USERNAME/url-shortener-backend:latest
    container_name: url-shortener-backend
    restart: always
    ports:
      - "5000:5000"

  frontend:
    image: YOUR_DOCKER_USERNAME/url-shortener-frontend:latest
    container_name: url-shortener-frontend
    restart: always
    ports:
      - "3000:80"