version: "3.8"

services:
  backend:
    image: yourdockerhubusername/url-shortener-backend:latest
    container_name: url-shortener-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env

  frontend:
    image: yourdockerhubusername/url-shortener-frontend:latest
    container_name: url-shortener-client
    restart: always
    ports:
      - "3000:80"

networks:
  default:
    driver: bridge